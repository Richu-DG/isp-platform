[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @isp/database generate && cd packages/database && npx tsc && cd ../shared && npx tsc && cd ../apps/api && pnpm build"

[deploy]
startCommand = "node apps/api/dist/main"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
