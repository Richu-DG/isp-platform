version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: isp-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - redis
    networks:
      - isp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: isp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - isp-net

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    container_name: isp-portal
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - isp-net

  redis:
    image: redis:7-alpine
    container_name: isp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - isp-net

  nginx:
    image: nginx:alpine
    container_name: isp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - api
      - web
      - portal
    networks:
      - isp-net

volumes:
  redis_data:
  nginx_certs:

networks:
  isp-net:
    driver: bridge
