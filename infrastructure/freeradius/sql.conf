# FreeRADIUS SQL configuration for Supabase PostgreSQL
# Place this in /etc/freeradius/3.0/mods-available/sql
# Then: ln -s ../mods-available/sql mods-enabled/sql

sql {
    driver = "rlm_sql_postgresql"
    dialect = "postgresql"

    server = "aws-0-eu-central-1.pooler.supabase.com"
    port = 5432
    login = "postgres.PROJECT_REF"
    password = "YOUR_SUPABASE_PASSWORD"

    radius_db = "postgres"

    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"

    read_groups = yes
    read_profiles = yes

    pool {
        start = ${thread[pool].start_servers}
        min = ${thread[pool].min_spare_servers}
        max = ${thread[pool].max_servers}
        spare = ${thread[pool].max_spare_servers}
        uses = 0
        retry_delay = 30
        lifetime = 0
        idle_timeout = 60
    }

    query_timeout = 5

    # Auth queries
    authorize_check_query = "\
        SELECT id, username, attribute, value, op \
        FROM ${authcheck_table} \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY id"

    authorize_reply_query = "\
        SELECT id, username, attribute, value, op \
        FROM ${authreply_table} \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY id"

    authorize_group_check_query = "\
        SELECT id, groupname, attribute, value, op \
        FROM ${groupcheck_table} \
        WHERE groupname = '%{Sql-Group}' \
        ORDER BY id"

    authorize_group_reply_query = "\
        SELECT id, groupname, attribute, value, op \
        FROM ${groupreply_table} \
        WHERE groupname = '%{Sql-Group}' \
        ORDER BY id"

    # Accounting queries
    accounting_onoff_query = "\
        UPDATE ${acct_table1} \
        SET acctstoptime = TO_TIMESTAMP(%{integer:Event-Timestamp}), \
            acctsessiontime = %{integer:Event-Timestamp} - EXTRACT(epoch FROM acctstarttime)::integer, \
            acctterminatecause = '%{Acct-Terminate-Cause}' \
        WHERE acctstoptime IS NULL \
        AND nasipaddress = '%{NAS-IP-Address}' \
        AND acctstarttime <= TO_TIMESTAMP(%{integer:Event-Timestamp})"

    accounting_update_query = "\
        UPDATE ${acct_table1} \
        SET acctupdatetime = NOW(), \
            acctinterval = %{Acct-Session-Time}, \
            acctinputoctets = %{Acct-Input-Octets}, \
            acctoutputoctets = %{Acct-Output-Octets} \
        WHERE acctsessionid = '%{Acct-Session-Id}' \
        AND username = '%{SQL-User-Name}' \
        AND nasipaddress = '%{NAS-IP-Address}' \
        AND acctstoptime IS NULL"

    accounting_start_query = "\
        INSERT INTO ${acct_table1} \
            (acctsessionid, acctuniqueid, username, realm, nasipaddress, nasportid, nasporttype, \
             acctstarttime, acctupdatetime, acctinputoctets, acctoutputoctets, calledstationid, \
             callingstationid, acctterminatecause, servicetype, framedprotocol, framedipaddress) \
        VALUES \
            ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', '%{Realm}', \
             '%{NAS-IP-Address}', '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
             TO_TIMESTAMP(%{integer:Event-Timestamp}), NOW(), 0, 0, '%{Called-Station-Id}', \
             '%{Calling-Station-Id}', '', '%{Service-Type}', '%{Framed-Protocol}', '%{Framed-IP-Address}')"

    accounting_stop_query = "\
        UPDATE ${acct_table2} \
        SET acctstoptime = TO_TIMESTAMP(%{integer:Event-Timestamp}), \
            acctsessiontime = %{Acct-Session-Time}, \
            acctinputoctets = %{Acct-Input-Octets}, \
            acctoutputoctets = %{Acct-Output-Octets}, \
            acctterminatecause = '%{Acct-Terminate-Cause}', \
            framedipaddress = '%{Framed-IP-Address}' \
        WHERE acctsessionid = '%{Acct-Session-Id}' \
        AND username = '%{SQL-User-Name}' \
        AND nasipaddress = '%{NAS-IP-Address}'"

    # Group membership
    simul_count_query = "\
        SELECT COUNT(*) FROM ${acct_table1} \
        WHERE username = '%{SQL-User-Name}' AND acctstoptime IS NULL"

    group_membership_query = "\
        SELECT groupname FROM ${usergroup_table} \
        WHERE username = '%{SQL-User-Name}' ORDER BY priority"
}
