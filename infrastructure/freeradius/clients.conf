# MikroTik routers that are allowed to send RADIUS requests.
# Add one client block per MikroTik router (or use a subnet for your network).

client mikrotik_local {
    ipaddr          = 192.168.0.0/16      # Adjust to your router subnet
    secret          = CHANGE_ME_RADIUS_SECRET
    shortname       = mikrotik
    nastype         = other
}

# For multiple sites add additional client blocks:
# client site2 {
#     ipaddr  = 10.10.0.1
#     secret  = CHANGE_ME_SITE2_SECRET
#     shortname = site2
# }
